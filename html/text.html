<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaflet Map Click Example</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    #map {
      height: 100vh; /* Full page map */
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaf  qlet.js"></script>
  <script>
    // Initialize map (centered on Philippines for you)
    const map = L.map('map').setView([12.8797, 121.7740], 6);

    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    let marker; // to store the marker

    // Function when map is clicked
    function onMapClick(e) {
      const lat = e.latlng.lat;
      const lng = e.latlng.lng;

      // Remove old marker if exists
      if (marker) {
        map.removeLayer(marker);
      }

      // Add new marker
      marker = L.marker([lat, lng]).addTo(map)
        .bindPopup(`Latitude: ${lat.toFixed(5)}<br>Longitude: ${lng.toFixed(5)}`)
        .openPopup();

      // Log to console
      console.log("Latitude:", lat, "Longitude:", lng);
    }

    // Attach click event
    map.on('click', onMapClick);
  </script>
</body>
</html>
